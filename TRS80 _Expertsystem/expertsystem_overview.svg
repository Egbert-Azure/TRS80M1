<svg xmlns="http://www.w3.org/2000/svg" width="760" height="600" viewBox="0 0 760 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="30" y="34" font-size="20" font-weight="bold" fill="#1a1a1a">Educational expert system — TRS-80 Model I</text>
  <text x="30" y="56" font-size="13" fill="#666">Teaches the recursive backward-chaining technique · Soll 1987 / Schröer 1989–90</text>

  <!-- BUILD SIDE -->
  <rect x="30" y="78" width="330" height="210" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="48" y="102" font-size="14" font-weight="bold" fill="#085041">Build side — editor</text>

  <rect x="48" y="116" width="294" height="50" rx="8" fill="#fff" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="195" y="136" font-size="13" font-weight="bold" fill="#085041" text-anchor="middle">wbedit.bas  (latest editor)</text>
  <text x="195" y="154" font-size="11.5" fill="#0F6E56" text-anchor="middle">full-screen input mask · save-bugs fixed</text>

  <rect x="48" y="178" width="140" height="46" rx="8" fill="#fff" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="118" y="198" font-size="12.5" font-weight="bold" fill="#085041" text-anchor="middle">maskgen.bas</text>
  <text x="118" y="214" font-size="11" fill="#0F6E56" text-anchor="middle">draws the forms</text>

  <rect x="202" y="178" width="140" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="272" y="198" font-size="12.5" font-weight="bold" fill="#444441" text-anchor="middle">maske1/2.dum</text>
  <text x="272" y="214" font-size="11" fill="#5F5E5A" text-anchor="middle">saved form screens</text>

  <line x1="118" y1="178" x2="135" y2="168" stroke="#0F6E56" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="272" y1="178" x2="250" y2="168" stroke="#0F6E56" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="195" y="244" font-size="11" fill="#0F6E56" text-anchor="middle">CMD"load" at runtime</text>

  <rect x="48" y="252" width="294" height="28" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="195" y="270" font-size="11.5" fill="#5F5E5A" text-anchor="middle">wedit.bas · fremedit.bas — older, inline mask, 2 bugs</text>

  <!-- KNOWLEDGE BASE -->
  <rect x="430" y="78" width="300" height="210" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="448" y="102" font-size="14" font-weight="bold" fill="#633806">Knowledge base (data file)</text>

  <rect x="448" y="116" width="264" height="50" rx="8" fill="#fff" stroke="#854F0B" stroke-width="1.5"/>
  <text x="580" y="136" font-size="13" font-weight="bold" fill="#633806" text-anchor="middle">testen</text>
  <text x="580" y="154" font-size="11.5" fill="#854F0B" text-anchor="middle">sample rule base (radio-fault demo)</text>

  <rect x="448" y="178" width="264" height="100" rx="8" fill="#fff" stroke="#854F0B" stroke-width="0.8"/>
  <text x="580" y="200" font-size="11.5" fill="#633806" text-anchor="middle">35 objects · 13 questions</text>
  <text x="580" y="220" font-size="11.5" fill="#633806" text-anchor="middle">16 rules · 5 constraints</text>
  <text x="580" y="240" font-size="11.5" fill="#633806" text-anchor="middle">4 entry questions</text>
  <text x="580" y="262" font-size="11" fill="#854F0B" text-anchor="middle">sequential ASCII format</text>

  <line x1="342" y1="140" x2="446" y2="140" stroke="#555" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="394" y="132" font-size="10.5" fill="#666" text-anchor="middle">writes</text>

  <!-- CONSULT SIDE -->
  <rect x="430" y="312" width="300" height="150" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="448" y="336" font-size="14" font-weight="bold" fill="#0C447C">Consult side — inference engine</text>

  <rect x="448" y="350" width="264" height="50" rx="8" fill="#fff" stroke="#185FA5" stroke-width="1.5"/>
  <text x="580" y="370" font-size="13" font-weight="bold" fill="#0C447C" text-anchor="middle">w.bas  =  WC/CMD (compiled)</text>
  <text x="580" y="388" font-size="11.5" fill="#185FA5" text-anchor="middle">pure backward chaining (goal-driven)</text>

  <rect x="448" y="410" width="264" height="42" rx="8" fill="#fff" stroke="#185FA5" stroke-width="0.8"/>
  <text x="580" y="430" font-size="11.5" fill="#0C447C" text-anchor="middle">asks questions → confirms one or</text>
  <text x="580" y="445" font-size="11.5" fill="#0C447C" text-anchor="middle">more diagnoses (goals)</text>

  <line x1="580" y1="278" x2="580" y2="348" stroke="#185FA5" stroke-width="1.4" marker-end="url(#arB)"/>
  <text x="624" y="304" font-size="10.5" fill="#185FA5" text-anchor="middle">reads</text>

  <!-- RECURSIVE STACK CALLOUT -->
  <rect x="30" y="312" width="330" height="150" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="48" y="336" font-size="14" font-weight="bold" fill="#3C3489">The recursive technique (the point)</text>
  <text x="48" y="358" font-size="11.5" fill="#26215C">No recursion in Level II BASIC, so recursion is</text>
  <text x="48" y="375" font-size="11.5" fill="#26215C">re-built as an explicit manual stack:</text>
  <text x="48" y="397" font-size="11.5" fill="#3C3489" font-family="monospace">SRNR%()  → which rule (the frame)</text>
  <text x="48" y="414" font-size="11.5" fill="#3C3489" font-family="monospace">PZAEHLER%() → which premise (1-5)</text>
  <text x="48" y="431" font-size="11.5" fill="#3C3489" font-family="monospace">STACK% → depth   (MSTACK%=100)</text>
  <text x="48" y="451" font-size="11" fill="#26215C">push 3220-3250 · pop 2030 · sub-goal 3030</text>

  <!-- BOTTOM SUMMARY -->
  <rect x="30" y="486" width="700" height="94" rx="12" fill="#F7F7F4" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="48" y="510" font-size="13" font-weight="bold" fill="#2C2C2A">In one line</text>
  <text x="48" y="532" font-size="12" fill="#444441">An educational expert-system shell: a learner answers yes/no questions; the engine works backward</text>
  <text x="48" y="550" font-size="12" fill="#444441">from each candidate goal, recursing into sub-rules via the manual stack, until it confirms the goals the</text>
  <text x="48" y="568" font-size="12" fill="#444441">evidence supports. Latest working pair: wbedit.bas (edit) + w.bas / WC/CMD (consult). testen is the demo KB.</text>
</svg>
